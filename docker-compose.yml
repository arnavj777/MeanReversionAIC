version: "3.8"

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  timescaledb:
    image: timescale/timescaledb:latest-pg15
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: arb_user
      POSTGRES_PASSWORD: arb_pass
      POSTGRES_DB: market_data
    volumes:
      - timescale_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arb_user -d market_data"]
      interval: 5s
      timeout: 3s
      retries: 5

  data_ingestion:
    build: .
    command: python -m data_ingestion.main
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy

  pca_engine:
    build: .
    command: python -m pca_engine.main
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy

  news_engine:
    build: .
    command: python -m news_engine.main
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy

  execution_engine:
    build: .
    command: python -m execution_engine.main
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy

volumes:
  timescale_data: